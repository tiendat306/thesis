version: "3.9"

services:
  postgres:
    image: postgres:15
    container_name: thesis_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data_test:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: thesis_redis
    ports:
      - "6380:6379"

volumes:
  postgres_data_test: